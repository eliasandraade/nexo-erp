# SonarCloud analysis configuration.
#
# EF Core migrations are scaffolded by the tooling, not hand-authored. Their CreateTable /
# index boilerplate is inherently repetitive across migrations, which inflates the
# "duplicated lines on new code" metric on small PRs (a false positive). Exclude the
# generated Migrations folder from copy/paste detection only — it is still analyzed for
# every other rule.
sonar.cpd.exclusions=**/Migrations/**
